name: Build Android

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  debug-apk:
    name: Debug APK (installable for testing)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icons and splash screens
        if: ${{ hashFiles('resources/icon.png') != '' }}
        run: npx @capacitor/assets generate --android

      - name: Sync web assets
        run: npx cap sync android

      - name: Build debug APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: bastion-td-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  release-aab:
    name: Signed release AAB (Play Store upload)
    # Runs only on version tags (v1.0.0 etc.) and needs signing secrets:
    # ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icons and splash screens
        if: ${{ hashFiles('resources/icon.png') != '' }}
        run: npx @capacitor/assets generate --android

      - name: Sync web assets
        run: npx cap sync android

      - name: Build unsigned release bundle
        run: cd android && chmod +x gradlew && ./gradlew bundleRelease

      - name: Sign AAB
        id: sign
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: bastion-td-release-aab
          path: ${{ steps.sign.outputs.signedReleaseFile }}
